<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Arab by Ahlan Akademi - Bimbel Online Bahasa Arab SMP/SMA</title>
    
    <!-- Google Fonts: Space Grotesk & Poppins & Scheherazade New -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons for beautiful visual elements -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            p1: '#185d6b', // Primer 1: Header, background besar, dominan
                            p2: '#168499', // Primer 2: Tombol utama, highlight, CTA utama
                            s1: '#53bcd3', // Sekunder 1: Pendukung, ikon, garis, badge
                            s2: '#E67E22', // Sekunder 2: Aksen tambahan/oranye segar (max 15%)
                            s3: '#f7fdff', // Sekunder 3: Background terang / light slate
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        grotesk: ['Hanken Grotesk', 'sans-serif'],
                        arabic: ['Scheherazade New', 'serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Smooth transition for modal & alerts */
        .modal-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        /* Mobile safe bottom padding for floating button */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- SCROLL REVEAL (fade + rise saat di-scroll) --- */
        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: opacity, transform;
        }
        .reveal-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        @media (prefers-reduced-motion: reduce) {
            .reveal-on-scroll {
                opacity: 1 !important;
                transform: none !important;
                transition: none !important;
            }
        }

        /* --- HERO CONVERSATION ANIMATION --- */
        @keyframes bubblePop {
            0%   { opacity: 0; transform: translateY(12px) scale(0.7) rotate(-3deg); }
            55%  { opacity: 1; transform: translateY(-3px) scale(1.06) rotate(1deg); }
            75%  { transform: translateY(1px) scale(0.98) rotate(-0.5deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
        }
        .bubble-pop {
            animation: bubblePop 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transform-origin: bottom center;
        }
        @keyframes bubbleSway {
            0%, 100% { transform: rotate(-0.6deg); }
            50%      { transform: rotate(0.6deg); }
        }
        .bubble-sway {
            animation: bubbleSway 2.6s ease-in-out infinite;
            transform-origin: bottom center;
        }
        @keyframes talkBob {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-7px); }
        }
        .talk-bob { animation: talkBob 0.9s ease-in-out infinite; }
        @keyframes idleFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-3px); }
        }
        .idle-float { animation: idleFloat 3.5s ease-in-out infinite; }
        @keyframes waveHand {
            0%, 100% { transform: rotate(0deg); }
            25%      { transform: rotate(18deg); }
            75%      { transform: rotate(-8deg); }
        }
        .wave-hand { transform-origin: bottom center; animation: waveHand 0.7s ease-in-out infinite; }

        /* --- HOVER MICRO-INTERACTION untuk kartu di semua halaman ---
           Pakai properti `translate` (bukan `transform`) supaya tidak bentrok
           dengan animasi reveal-on-scroll yang memakai `transform`. */
        .ui-hover {
            transition: translate 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                        box-shadow 0.3s ease,
                        scale 0.3s ease;
            cursor: default;
        }
        .ui-hover:hover {
            translate: 0 -6px;
            scale: 1.015;
            box-shadow: 0 20px 34px -14px rgba(22, 132, 153, 0.40);
            z-index: 5;
        }
        @media (prefers-reduced-motion: reduce) {
            .ui-hover:hover { translate: none; scale: 1; }
        }

        /* --- TOMBOL GRADIEN BERANIMASI (Amankan Slot) --- */
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes sheen {
            0%   { left: -70%; }
            45%  { left: 130%; }
            100% { left: 130%; }
        }
        .btn-glow {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, #E67E22, #f5a24d, #E67E22, #168499, #E67E22);
            background-size: 300% 100%;
            animation: gradientShift 5s ease infinite;
            box-shadow: 0 10px 24px -6px rgba(230, 126, 34, 0.55);
        }
        .btn-glow::after {
            content: '';
            position: absolute;
            top: 0; left: -70%;
            width: 45%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
            transform: skewX(-20deg);
            animation: sheen 3.8s ease-in-out infinite;
            pointer-events: none;
        }
        .btn-glow:hover {
            animation-duration: 2s;
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 30px -6px rgba(230, 126, 34, 0.65);
        }
        .btn-glow:active { transform: translateY(0) scale(0.97); }

        /* --- KOTAK HARGA DENGAN CAHAYA BERPUTAR --- */
        @keyframes spinLight {
            to { transform: rotate(360deg); }
        }
        .glow-box {
            position: relative;
            border-radius: 1rem;
            overflow: hidden;
            isolation: isolate;
        }
        .glow-box::before {
            content: '';
            position: absolute;
            z-index: -2;
            top: 50%; left: 50%;
            width: 220%; height: 220%;
            transform-origin: center;
            background: conic-gradient(from 0deg,
                transparent 0deg,
                #53bcd3 40deg,
                #eafaff 70deg,
                #53bcd3 100deg,
                transparent 150deg,
                transparent 360deg);
            translate: -50% -50%;
            animation: spinLight 4.5s linear infinite;
        }
        .glow-box::after {
            content: '';
            position: absolute;
            z-index: -1;
            inset: 3px;
            border-radius: 0.8rem;
            background: linear-gradient(135deg, #185d6b 0%, #168499 55%, #2ba0bd 100%);
        }
        @media (prefers-reduced-motion: reduce) {
            .glow-box::before { animation: none; }
        }
    </style>
</head>
<body class="bg-brand-s3 text-slate-800 font-sans antialiased selection:bg-brand-s1 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef } = React;

        function App() {
            const [currentPage, setCurrentPage] = useState('home'); // home, program, tentang, guru, kontak
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showPromoPopup, setShowPromoPopup] = useState(false);
            const [showStickyBanner, setShowStickyBanner] = useState(true);
            const [selectedProgramTab, setSelectedProgramTab] = useState('reguler'); // reguler, privat

            // Trigger Promo Popup on Load (1.5 seconds)
            useEffect(() => {
                const timer = setTimeout(() => {
                    const hasClosedPopup = sessionStorage.getItem('promoClosed');
                    if (!hasClosedPopup) {
                        setShowPromoPopup(true);
                    }
                }, 1500);
                return () => clearTimeout(timer);
            }, []);

            const closePopup = () => {
                setShowPromoPopup(false);
                sessionStorage.setItem('promoClosed', 'true');
            };

            // Scroll-reveal: fade + rise setiap section/kartu saat masuk viewport.
            // useLayoutEffect dipakai supaya class 'reveal-on-scroll' terpasang
            // sebelum browser paint (biar gak ada kedip). Re-run tiap ganti halaman.
            useLayoutEffect(() => {
                const nodes = Array.from(document.querySelectorAll(
                    'main > div > section, main > div > div, footer > div'
                ));
                if (nodes.length === 0) return;

                nodes.forEach((el) => el.classList.add('reveal-on-scroll'));

                if (!('IntersectionObserver' in window)) {
                    nodes.forEach((el) => el.classList.add('is-visible'));
                    return;
                }

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

                nodes.forEach((el) => observer.observe(el));

                // Hover micro-interaction: pasang ke kartu utama tiap halaman.
                // Hanya kartu terluar (bukan yang bersarang) supaya tidak dobel gerak.
                const cardCandidates = Array.from(document.querySelectorAll(
                    'main [class*="bg-white"][class*="rounded-"][class*="shadow"]'
                ));
                const hoverCards = [];
                cardCandidates.forEach((el) => {
                    if (el.classList.contains('no-hover')) return;
                    if (el.parentElement && el.parentElement.closest('.ui-hover')) return;
                    el.classList.add('ui-hover');
                    hoverCards.push(el);
                });

                return () => {
                    observer.disconnect();
                    nodes.forEach((el) => el.classList.remove('reveal-on-scroll', 'is-visible'));
                    hoverCards.forEach((el) => el.classList.remove('ui-hover'));
                };
            }, [currentPage]);

            // Links definition
            const LINKS = {
                tallyForm: "https://tally.so/r/LZoAQ2",
                whatsapp: "https://wa.me/6285111202412?text=Assalamualaikum,%20Kak%2C%20aku%20mau%20tanya%20soal%20Les%20Arab",
                instagram: "https://instagram.com/lesarab.ahlanakademi"
            };

            const navigateTo = (page) => {
                setCurrentPage(page);
                setIsMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Footer putih hanya di Beranda; halaman lain pakai warna gelap (brand-p1)
            const isHome = currentPage === 'home';

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden">
                    
                    {/* --- STICKY BANNER PROMO (TOP) --- */}
                    {showStickyBanner && (
                        <div className="bg-brand-s2 text-white px-4 py-2 text-xs md:text-sm text-center font-semibold flex justify-between items-center z-50 sticky top-0 shadow-md">
                            <span className="mx-auto flex items-center gap-1.5 flex-wrap justify-center px-2">
                                <span className="animate-pulse">🔥</span> 
                                <strong>Early Bird 15%:</strong> Rp48rb/sesi
                                <span className="font-normal">+ 🎁 Gratis pertemuan pertama</span>
                                <span className="hidden md:inline font-normal">• Bebas biaya daftar</span>
                                <button onClick={() => navigateTo('kontak')} className="underline hover:text-brand-p1 ml-1 font-bold">Klaim Slot</button>
                            </span>
                            <button onClick={() => setShowStickyBanner(false)} className="text-white hover:text-brand-p1 text-base font-bold focus:outline-none p-1">
                                &times;
                            </button>
                        </div>
                    )}

                    {/* --- HEADER & NAVIGATION (WARNA #f7fdff SAMA DENGAN BRAND-S3) --- */}
                    <header className={`bg-brand-s3 text-slate-800 border-b border-slate-200/60 sticky ${showStickyBanner ? 'top-8' : 'top-0'} z-40 transition-all duration-300 shadow-sm`}>
                        <div className="max-w-6xl mx-auto px-4 py-1 md:py-3 flex justify-between items-center">
                            
                            {/* Logo Link */}
                            <button
                                onClick={() => navigateTo('home')}
                                className="flex items-center transition-transform hover:scale-105 focus:outline-none"
                                aria-label="Les Arab by Ahlan Akademi - Beranda"
                            >
                                <img
                                    src="mainlogo.png"
                                    alt="Les Arab by Ahlan Akademi"
                                    className="h-9 md:h-12 w-auto object-contain"
                                />
                            </button>

                            {/* Desktop Navigation */}
                            <nav className="hidden md:flex items-center gap-6 font-medium text-sm">
                                <button onClick={() => navigateTo('home')} className={`transition py-1 ${currentPage === 'home' ? 'text-brand-p1 border-b-2 border-brand-p1 font-bold' : 'text-slate-600 hover:text-brand-p2'}`}>Beranda</button>
                                <button onClick={() => navigateTo('program')} className={`transition py-1 ${currentPage === 'program' ? 'text-brand-p1 border-b-2 border-brand-p1 font-bold' : 'text-slate-600 hover:text-brand-p2'}`}>Program & Harga</button>
                                <button onClick={() => navigateTo('tentang')} className={`transition py-1 ${currentPage === 'tentang' ? 'text-brand-p1 border-b-2 border-brand-p1 font-bold' : 'text-slate-600 hover:text-brand-p2'}`}>Tentang Kami</button>
                                <button onClick={() => navigateTo('guru')} className={`transition py-1 ${currentPage === 'guru' ? 'text-brand-p1 border-b-2 border-brand-p1 font-bold' : 'text-slate-600 hover:text-brand-p2'}`}>Guru Tutor</button>
                                <button onClick={() => navigateTo('kontak')} className="bg-brand-p2 hover:bg-brand-p2/80 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition shadow-md">Daftar Sekarang</button>
                            </nav>

                            {/* Mobile Hamburger Menu (Thumb-friendly & Accessible) */}
                            <button 
                                onClick={() => setIsMenuOpen(!isMenuOpen)} 
                                className="md:hidden p-2 text-brand-p1 rounded-xl focus:outline-none hover:bg-slate-100 active:scale-95 transition"
                                aria-label="Toggle Menu"
                            >
                                <i className={`fa-solid ${isMenuOpen ? 'fa-xmark' : 'fa-bars'} text-2xl`}></i>
                            </button>
                        </div>

                        {/* Mobile Dropdown Panel */}
                        {isMenuOpen && (
                            <div className="md:hidden bg-brand-s3 border-t border-slate-200/60 px-4 py-4 space-y-3 shadow-inner">
                                <button onClick={() => navigateTo('home')} className={`block w-full text-left py-3 px-4 rounded-xl text-base font-semibold ${currentPage === 'home' ? 'bg-brand-p2/10 text-brand-p1' : 'text-slate-600 hover:bg-slate-100'}`}>Beranda</button>
                                <button onClick={() => navigateTo('program')} className={`block w-full text-left py-3 px-4 rounded-xl text-base font-semibold ${currentPage === 'program' ? 'bg-brand-p2/10 text-brand-p1' : 'text-slate-600 hover:bg-slate-100'}`}>Program & Harga</button>
                                <button onClick={() => navigateTo('tentang')} className={`block w-full text-left py-3 px-4 rounded-xl text-base font-semibold ${currentPage === 'tentang' ? 'bg-brand-p2/10 text-brand-p1' : 'text-slate-600 hover:bg-slate-100'}`}>Tentang Kami</button>
                                <button onClick={() => navigateTo('guru')} className={`block w-full text-left py-3 px-4 rounded-xl text-base font-semibold ${currentPage === 'guru' ? 'bg-brand-p2/10 text-brand-p1' : 'text-slate-600 hover:bg-slate-100'}`}>Guru Tutor</button>
                                <div className="pt-2">
                                    <button onClick={() => navigateTo('kontak')} className="btn-glow w-full text-white py-4 rounded-2xl text-center font-grotesk font-bold text-base uppercase tracking-wider">
                                        🚀 Gas Daftar
                                    </button>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* --- MAIN BODY CONTENT --- */}
                    <main className="flex-grow">
                        {currentPage === 'home' && <HomeView navigateTo={navigateTo} LINKS={LINKS} />}
                        {currentPage === 'program' && <ProgramView navigateTo={navigateTo} LINKS={LINKS} selectedTab={selectedProgramTab} setSelectedTab={setSelectedProgramTab} />}
                        {currentPage === 'tentang' && <TentangView navigateTo={navigateTo} LINKS={LINKS} />}
                        {currentPage === 'guru' && <GuruView navigateTo={navigateTo} LINKS={LINKS} />}
                        {currentPage === 'kontak' && <KontakView LINKS={LINKS} />}
                    </main>

                    {/* --- FOOTER (BACKGROUND PUTIH) --- */}
                    <footer className={`border-t pt-10 pb-20 md:pb-10 transition-colors duration-300 ${isHome ? 'bg-white text-slate-700 border-slate-200' : 'bg-brand-p1 text-white border-brand-p2/30'}`}>
                        <div className="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
                            
                            {/* Brand Profile */}
                            <div>
                                <div className="flex items-center gap-2 mb-4">
                                    {isHome ? (
                                        <img 
                                            src="mainlogo.png"
                                            alt="Les Arab by Ahlan Akademi"
                                            className="h-10 w-auto object-contain"
                                        />
                                    ) : (
                                        <div className="bg-white px-2 py-1 rounded-xl shadow-md border border-brand-s1/20 flex items-center">
                                            <img 
                                                src="mainlogo.png"
                                                alt="Les Arab by Ahlan Akademi"
                                                className="h-8 w-auto object-contain"
                                            />
                                        </div>
                                    )}
                                </div>
                                <p className={`text-sm leading-relaxed ${isHome ? 'text-slate-500' : 'text-slate-300'}`}>
                                    Bimbel bahasa Arab online interaktif buat pelajar SMP/SMA (usia 13–18 tahun). Belajar mudah dan seru bareng alumni Timur Tengah.
                                </p>
                                <p className={`text-xs mt-3 font-semibold ${isHome ? 'text-brand-p2' : 'text-brand-s1'}`}>Program Resmi oleh Ahlan Akademi</p>
                            </div>

                            {/* Navigation Links */}
                            <div>
                                <h3 className={`font-grotesk font-bold text-lg mb-4 ${isHome ? 'text-brand-p1' : 'text-brand-s1'}`}>Navigasi Cepat</h3>
                                <div className="grid grid-cols-2 gap-2 text-sm">
                                    <button onClick={() => navigateTo('home')} className={`text-left transition ${isHome ? 'text-slate-600 hover:text-brand-p2' : 'text-slate-300 hover:text-white'}`}>Beranda</button>
                                    <button onClick={() => navigateTo('program')} className={`text-left transition ${isHome ? 'text-slate-600 hover:text-brand-p2' : 'text-slate-300 hover:text-white'}`}>Program & Harga</button>
                                    <button onClick={() => navigateTo('tentang')} className={`text-left transition ${isHome ? 'text-slate-600 hover:text-brand-p2' : 'text-slate-300 hover:text-white'}`}>Tentang Kami</button>
                                    <button onClick={() => navigateTo('guru')} className={`text-left transition ${isHome ? 'text-slate-600 hover:text-brand-p2' : 'text-slate-300 hover:text-white'}`}>Guru Tutor</button>
                                    <button onClick={() => navigateTo('kontak')} className="text-left text-brand-s2 hover:text-brand-s2/80 transition font-bold">Daftar</button>
                                </div>
                            </div>

                            {/* Contact Info & Social Proof */}
                            <div>
                                <h3 className={`font-grotesk font-bold text-lg mb-4 ${isHome ? 'text-brand-p1' : 'text-brand-s1'}`}>Tanya Kak Admin</h3>
                                <ul className={`space-y-3 text-sm ${isHome ? 'text-slate-600' : 'text-slate-300'}`}>
                                    <li>
                                        <a href={LINKS.whatsapp} target="_blank" rel="noopener noreferrer" className={`flex items-center gap-2 transition py-1 ${isHome ? 'hover:text-brand-p2' : 'hover:text-white'}`}>
                                            <i className={`fa-brands fa-whatsapp text-lg ${isHome ? 'text-emerald-500' : 'text-emerald-400'}`}></i>
                                            <span>+62 851-1120-2412</span>
                                        </a>
                                    </li>
                                    <li>
                                        <a href={LINKS.instagram} target="_blank" rel="noopener noreferrer" className={`flex items-center gap-2 transition py-1 ${isHome ? 'hover:text-brand-p2' : 'hover:text-white'}`}>
                                            <i className={`fa-brands fa-instagram text-lg ${isHome ? 'text-pink-500' : 'text-pink-400'}`}></i>
                                            <span>@lesarab.ahlanakademi</span>
                                        </a>
                                    </li>
                                    <li className={`text-xs pt-2 border-t ${isHome ? 'text-slate-500 border-slate-200' : 'text-slate-400 border-slate-700'}`}>
                                        <i className="fa-solid fa-graduation-cap mr-1"></i> Bagian dari Ahlan Akademi – Platform Bimbel E-learning Mahasiswa Indonesia di Mesir.
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <div className={`max-w-6xl mx-auto px-4 mt-8 pt-6 border-t text-center text-xs ${isHome ? 'border-slate-200 text-slate-400' : 'border-slate-700/50 text-slate-400'}`}>
                            <p>&copy; {new Date().getFullYear()} Les Arab by Ahlan Akademi. All rights reserved.</p>
                        </div>
                    </footer>

                    {/* --- FLOATING WHATSAPP BUTTON --- */}
                    <a 
                        href={LINKS.whatsapp}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="fixed bottom-5 right-5 z-50 bg-emerald-500 hover:bg-emerald-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-all animate-bounce"
                        aria-label="Tanya via WhatsApp"
                    >
                        <i className="fa-brands fa-whatsapp text-3xl"></i>
                    </a>

                    {/* --- PROMO POPUP MODAL --- */}
                    {showPromoPopup && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div 
                                className="bg-white rounded-3xl w-full max-w-[340px] overflow-hidden shadow-2xl relative modal-fade-in"
                                onClick={(e) => e.stopPropagation()}
                            >
                                {/* Header gradien */}
                                <div className="bg-gradient-to-br from-brand-p1 via-brand-p2 to-[#2ba0bd] p-6 pt-8 text-center text-white relative">
                                    <button 
                                        onClick={closePopup}
                                        className="absolute top-3 right-3 bg-white/15 hover:bg-white/25 text-white w-7 h-7 rounded-full flex items-center justify-center text-sm transition focus:outline-none"
                                        aria-label="Tutup"
                                    >
                                        &times;
                                    </button>

                                    <span className="text-3xl"></span>

                                    <span className="inline-block bg-brand-s2 text-white text-[11px] font-grotesk font-bold uppercase tracking-widest px-3 py-1 rounded-full mt-2">
                                        ✨ Promo Early Bird ✨
                                    </span>
                                    <h3 className="font-grotesk text-2xl font-extrabold uppercase leading-tight mt-2">
                                        Diskon 15%
                                    </h3>
                                    <p className="text-xs text-white/70 mt-1">Khusus 15 Siswa Pertama, Batch Agustus 2026</p>
                                </div>

                                {/* Body */}
